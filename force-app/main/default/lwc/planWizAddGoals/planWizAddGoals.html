<template>
    <template if:false={isHousehold}>
        <div class="head">
            <div class="slds-align_absolute-center slds-text-heading_medium">
                <strong>New Individual Goal</strong>
            </div>
        </div>
    </template>
    <div if:true={isLoading}>
        <lightning-spinner variant="brand" 
                           alternative-text="Loading"     
                           size="medium">
        </lightning-spinner>
    </div>
    
    <template if:true={renderCmp}>
        <lightning-record-edit-form object-api-name="caresp__Goal__c" record-id={goalId} onsubmit={handleSaveGoalDetails}>
        
            <!-- Error Messages -->
            <template if:false={allGood}>
                <div style="height:4rem;">
                    <div class="slds-notify slds-notify_toast slds-theme_error slds-align_absolute-center" role="status" style="margin-right:1rem; margin-left:1rem;">
                        <div class="slds-notify__content">
                            <h2 class="slds-text-heading_small">
                                {message}
                            </h2>
                        </div>
                    </div>
                </div>
            </template>
            <lightning-messages></lightning-messages>
    
            <!-- Goal Fields — No fallback: require active Goal blueprint configuration -->
            <template if:false={hasGoalBlueprints}>
                <div class="slds-box slds-theme_warning slds-m-bottom_medium">
                    No active Goal Template Field Blueprint is configured for this plan template. Please activate/configure a Goal Template blueprint and try again.
                </div>
            </template>

            <!-- Goal Fields — Blueprint-Configured (dynamic, from Goal_Template_Field_Blueprint__c) -->
            <template if:true={hasGoalBlueprints}>
                <template for:each={goalFieldBlueprints} for:item="section">
                    <div key={section.sectionName}>
                        <div class="slds-box slds-box_xx-small sectionHeader slds-text-title_bold slds-m-top_medium slds-m-bottom_x-small slds-align_absolute-center">
                            {section.sectionName}
                        </div>
                        <div class="slds-grid slds-wrap">
                            <template for:each={section.fieldBlueprints} for:item="field">
                                <div key={field.value} class="slds-col slds-size--1-of-3">
                                    <lightning-input-field
                                        field-name={field.value}
                                        variant="label-stacked"
                                        required={field.isMandatory}
                                        disabled={field.isReadOnly}>
                                    </lightning-input-field>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </template>
    
            <template if:true={hasGoalBlueprints}>
                <br/>
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size--7-of-8">
                        <div class="slds-box slds-box_xx-small sectionHeader slds-text-title_bold slds-m-bottom_medium slds-align_absolute-center">
                            {stepType} Steps (Optional)
                        </div>
                    </div>
                    <div class="slds-col">
                    <lightning-button variant="brand" label="+ Add Step" onclick={handleAddStep} disabled={isAddStepDisabled} style="margin-left: 1rem;"></lightning-button>
                    </div>
                </div>
            <template if:false={hasStepBlueprints}>
                <div class="slds-box slds-theme_warning slds-m-bottom_small">
                    No active Step Template Field Blueprint is configured for this plan template. Step fields are hidden until a Step blueprint is active.
                </div>
            </template>

                <!-- Steps -->
                <template for:each={listSteps} for:item="step">
                    <div class="slds-box slds-m-bottom_xx-small" key={step.stepId}>
                        <c-plan-wiz-add-steps key={step.Id} client-name={clientName} record-id={recordId} goal-id={goalId} step-id={step.Id} num-val={step.caresp__Step_Num__c} start-date-val={step.caresp__Start_Date__c} assigned-to-val={step.caresp__Assigned_To__c} step-record={step} object-api-name={objectApiName} step-field-blueprints={stepFieldBlueprints}></c-plan-wiz-add-steps>
                    </div>
                </template>
            </template>


            <!-- Buttons -->
            <br/>
            <div class="slds-align_absolute-center">
                <lightning-button variant="neutral" label="Cancel" onclick={closeGoalsModal} style="margin-right: 1rem;"></lightning-button>
                <template if:true={hasGoalBlueprints}>
                    <lightning-button variant="brand" label="Save & New" onclick={saveAndNew} style="margin-right: 1rem;"></lightning-button>
                    <lightning-button variant="brand" label="Save" type="submit" ></lightning-button>
                </template>
            </div>
        </lightning-record-edit-form>
    </template>
    
</template>
